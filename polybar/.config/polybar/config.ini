include-file = ~/.config/polybar/colors.ini

[bar/example]
monitor = ${env:MONITOR:}
width = 96%
height = 26pt
offset-x = 2%
offset-y = 1%
radius = 10

background = ${colors.bg}
foreground = ${colors.fg}

# Invisible border to fake the floating effect
border-size = 4pt
border-color = ${colors.empty}

padding-left = 2
padding-right = 2
module-margin = 2

# FONT CONFIGURATION (Sizes balanced to stop overlapping)
font-0 = "JetBrains Mono:weight=bold:size=11;2"
font-1 = "JetBrainsMono Nerd Font:size=12;2"
font-2 = "JetBrainsMonoNL Nerd Font:size=12;2"

modules-left = workspaces 
modules-center = date 
modules-right = pulseaudio memory cpu battery powermenu

[module/xwindow]
type = internal/xwindow
label = %title%
label-maxlen = 50

[module/workspaces]
type = internal/xworkspaces
pin-workspaces = false
strip-workspace-numbers = false

# Forces the gap between workspaces to be totally transparent
label-separator = " "
label-separator-background = ${colors.empty}

# Map system workspaces to visual labels. Workspace 4 gets the dot.
icon-0 = 1;1
icon-1 = 2;2
icon-2 = 3;3
icon-3 = 4;4 •
icon-4 = 5;5
icon-5 = 6;6
icon-6 = 7;7
icon-7 = 8;8
icon-8 = 9;9
icon-9 = 10;10
icon-default = %name%

label-active = %icon%
label-active-foreground = ${colors.bg}
label-active-background = ${colors.accent}
label-active-padding = 2

label-occupied = %icon%
label-occupied-foreground = ${colors.fg}
label-occupied-background = ${colors.bg-alt}
label-occupied-padding = 2

label-empty = %icon%
label-empty-foreground = ${colors.fg}
label-empty-background = ${colors.bg}
label-empty-padding = 2

label-urgent = %icon%
label-urgent-foreground = ${colors.bg}
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

[module/date]
type = internal/date
interval = 60
date = %I:%M %p
date-alt = %A, %Y-%m-%d
format-prefix = "  "
format-prefix-foreground = ${colors.accent}
label = %date%

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <ramp-volume>  <label-volume>
label-volume = %percentage:2%% 
label-volume-foreground = ${colors.fg}

ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
ramp-volume-foreground = ${colors.accent}

# No inline tags to avoid the }} bug
format-muted-prefix = "  "
format-muted-prefix-foreground = ${colors.alert}
label-muted = MUTED
label-muted-foreground = ${colors.fg}
click-middle = pavucontrol

[module/memory]
type = internal/memory
interval = 2
format-prefix = "󰍛  "
format-prefix-foreground = ${colors.accent}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "  "
format-prefix-foreground = ${colors.accent}
label = %percentage:2%%

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 98

format-charging = <animation-charging>  <label-charging>
format-discharging = <ramp-capacity>  <label-discharging>
format-full = <ramp-capacity>  <label-full>

label-charging = %percentage:2%%
label-discharging = %percentage:2%%
label-full = %percentage:2%%

ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 
ramp-capacity-foreground = ${colors.accent}

animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-3 = 
animation-charging-4 = 
animation-charging-foreground = ${colors.accent}
animation-charging-framerate = 750

[module/powermenu]
type = custom/text
content = ""
content-foreground = ${colors.alert}
click-left = ~/.config/rofi/scripts/powermenu.sh
