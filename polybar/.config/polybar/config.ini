[colors]
bg = #1a1b26
bg-alt = #24283b
fg = #c0caf5
accent = #7aa2f7
alert = #f7768e
empty = #00000000

[bar/example]
monitor = ${env:MONITOR:}
width = 96%
height = 26pt
offset-x = 0%
offset-y = 0%
radius = 10

background = ${colors.bg}
foreground = ${colors.fg}

# Invisible border to fake the floating effect in i3
border-size = 4pt
border-color = ${colors.empty}

padding-left = 2
padding-right = 2
module-margin = 2

# FONT CONFIGURATION (Fixed and active)
font-0 = "JetBrains Mono:weight=bold:size=10;2"
font-1 = "JetBrainsMono Nerd Font:size=13;3"
font-2 = "JetBrainsMonoNL Nerd Font:size=13;3"

# modules-left = bspwm
modules-left = bspwm
modules-center = date
modules-right = pulseaudio memory cpu obs powermenu

# [module/i3]
[module/bspwm]
#type = internal/i3
type = internal/bspwm
pin-workspaces = false
show-urgent = true
strip-workspace-numbers = false

label-separator = "  "

label-focused = %name%
label-focused-foreground = ${colors.bg}
label-focused-background = ${colors.accent}
label-focused-padding = 4

label-unfocused = %name%
label-unfocused-foreground = ${colors.fg}
label-unfocused-background = ${colors.bg-alt}
label-unfocused-padding = 4

label-urgent = %name%
label-urgent-foreground = ${colors.bg}
label-urgent-background = ${colors.alert}
label-urgent-padding = 4

[module/date]
type = internal/date
interval = 1
date = %I:%M %p - %d %A
date-alt = %A, %Y-%m-%d
label = %date%
label-foreground = ${colors.accent}

[module/pulseaudio]
type = internal/pulseaudio
format-volume = VOL <label-volume>
label-volume = %percentage%%
label-volume-foreground = ${colors.fg}
label-muted = MUTED
label-muted-foreground = ${colors.alert}
click-middle = pavucontrol

[module/memory]
type = internal/memory
interval = 2
label = RAM %percentage_used%%
label-foreground = ${colors.accent}

[module/cpu]
type = internal/cpu
interval = 2
label = CPU %percentage%%
label-foreground = ${colors.fg}

; [module/obs]
; type = custom/script
; exec = ~/.config/polybar/scripts/obs.sh
; interval = 2

[module/powermenu]
type = custom/text
content = ""
content-foreground = ${colors.alert}
click-left = ~/.config/rofi/scripts/powermenu.sh
