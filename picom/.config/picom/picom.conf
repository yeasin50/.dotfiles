backend = "glx";
vsync = true;

# --- Fading (only effect you want) ---
fade = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;

# --- basic compatibility ---
detect-client-opacity = true;

# --- GPU-friendly GLX tuning ---
glx-no-stencil = true;
glx-copy-from-front = false;

# --- performance ---
use-damage = true;

# --- disable everything heavy ---
shadow = false;
blur-method = "none";
animations = false;
