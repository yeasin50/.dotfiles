
backend = "glx";
vsync = true;
use-damage = true;


shadow = true;
shadow-radius = 10;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-opacity = 0.35;


fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;


inactive-opacity = 0.95;
active-opacity = 1.0;
frame-opacity = 1.0;

blur-method = "none";

corner-radius = 8;
rounded-corners-exclude = [
  # "class_g = 'Polybar'",
  # "class_g = 'Rofi'",
];

animations = true;
animation-for-open-window = "zoom";
animation-for-unmap-window = "zoom";

# Misc

mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;

unredir-if-possible = false;
