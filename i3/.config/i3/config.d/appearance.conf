# --- Windows & Gaps ---
# Hide title bars and set thin borders
for_window [class=".*"] border pixel 2
gaps inner 10
gaps outer 5

# Only show gaps if there is more than one window
smart_gaps on
smart_borders on

# --- Colors (Dracula-inspired palette) ---
# class                 border  backgr. text    indicator child_border
client.focused          #6272a4 #6272a4 #ffffff #ff79c6   #6272a4
client.focused_inactive #44475a #44475a #ffffff #44475a   #44475a
client.unfocused        #282a36 #282a36 #bfbfbf #282a36   #282a36
client.urgent           #ff5555 #ff5555 #ffffff #ff5555   #ff5555

# --- Background & Effects ---
# Set Wallpaper (Change this path to your image!)
exec_always --no-startup-id feh --bg-fill ~/Pictures/bg/window_bluish.png

# Start Picom (Enables shadows, fading, and transparency)
# Using 'backend xrender' is safer on Mint, 'glx' is faster if you have a GPU
exec_always --no-startup-id picom --fading --fade-delta 5 --shadow --backend xrender -b

# --- GTK Theme Fix ---
# Makes Mint's themes/icons apply to i3 apps
exec_always --no-startup-id /usr/lib/gnome-settings-daemon/gsd-xsettings

exec_always --no-startup-id ~/.config/polybar/launch.sh
