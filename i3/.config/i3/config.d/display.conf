# Set primary and secondary monitors based on your script
# HDMI-A-0 is 1920x1080 (Landscape)
# DisplayPort-2 is 1280x1024 (Portrait) positioned to the right
exec_always --no-startup-id xrandr --output HDMI-A-0 --primary --mode 1920x1080 --scale 1x1 --pos 0x0 --output DisplayPort-2 --mode 1280x1024 --pos 1920x0 --rotate right

# Ensure the cursor size is set (from your gsettings line)
exec_always --no-startup-id gsettings set org.cinnamon.desktop.interface cursor-size 24

# --- Workspace Assignments ---
# This ensures that when you boot up, your workspaces go to the right screens
workspace 1 output HDMI-A-0
workspace 2 output HDMI-A-0
workspace 3 output HDMI-A-0
workspace 4 output DisplayPort-2
workspace 5 output DisplayPort-2
workspace 6 output DisplayPort-2
