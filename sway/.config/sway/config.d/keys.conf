# --- Apps ---

# Terminal (WezTerm)
# WezTerm has great native Wayland support
bindsym $mod+Return exec wezterm start --cwd .

# Browser (Zen Flatpak)
# Note: You may need to set an environment variable if Zen doesn't auto-detect Wayland
bindsym $mod+b exec flatpak run app.zen_browser.zen

# File manager
bindsym $mod+f exec xdg-open .

# Kdenlive AppImage
# Most AppImages work fine via XWayland on Sway
bindsym $mod+k exec /home/yeasin/apps/kdenlive-26.04.0-x86_64.AppImage

# --- Wayland Specific Tools ---

# Screenshot (Replaces gnome-screenshot)
# Requires: sudo apt install grim slurp wl-clipboard
bindsym $mod+Shift+s exec flameshot gui

# Emoji picker
bindsym Control+period exec flatpak run io.github.vemonet.EmojiMart

# --- Monitor Management ---

# Move the current window to the "other" monitor
bindsym $mod+Shift+greater move container to output next
bindsym $mod+Shift+less move container to output prev

# Move focus (the cursor) to the other monitor
bindsym $mod+greater focus output next
bindsym $mod+less focus output prev
