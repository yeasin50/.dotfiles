# --- Windows & Gaps ---
# In Wayland, we use app_id for native apps and class for XWayland apps.
# This double-rule ensures all windows get the thin border.
for_window [app_id=".*"] border pixel 2
for_window [class=".*"] border pixel 2

gaps inner 10
gaps outer 2

# Sway syntax for smart gaps/borders
smart_gaps on
smart_borders on

# --- Colors (Dracula) ---
# These work exactly the same as i3!
client.focused          #6272a4 #6272a4 #ffffff #ff79c6   #6272a4
client.focused_inactive #44475a #44475a #ffffff #44475a   #44475a
client.unfocused        #282a36 #282a36 #bfbfbf #282a36   #282a36
client.urgent           #ff5555 #ff5555 #ffffff #ff5555   #ff5555

# --- Background & Effects ---
# Sway doesn't use feh. Use swaybg (sudo apt install swaybg)
exec_always swaybg -i ~/Pictures/bg/window_bluish.png -m fill

# --- IMPORTANT: REMOVE PICOM ---
# Sway is a compositor. Picom will not run and is not needed. 
# Transparency/shadows are handled by Sway natively (via your config/Waybar).

# --- GTK Theme Fix (Wayland version) ---
# Instead of gsd-xsettings, we ensure the environment knows we are in Sway.
exec dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=sway

# --- Status Bar ---
# Polybar does NOT support Sway/Wayland natively.
# You have two choices:
# 1. Use Waybar (The standard for Sway - sudo apt install waybar)
exec_always --no-startup-id sh -c 'pkill waybar; waybar'
# 2. Or use the simple default swaybar:
# bar {
#     status_command i3status
# }
